<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epicki Test Mikołaja - Ułamki Dziesiętne</title>
    
    <!-- Importy Tailwind CSS i Reacta (podejście SPA działające bez bundlerów) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Czcionka Google dla gamingowego klimatu -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'gamer': ['Orbitron', 'sans-serif'],
                        'sans': ['Inter', 'sans-serif']
                    },
                    colors: {
                        'neon-blue': '#00f3ff',
                        'neon-purple': '#bc13fe',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; }
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-shadow { box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }
        .neon-text { text-shadow: 0 0 8px rgba(0, 243, 255, 0.8); }
        
        /* Animacje */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Baza 5 epickich zadań dla Mikołaja
        const taskDatabase = [
            {
                id: 0,
                question: "Mikołaj organizuje epicką imprezę gamingową. Ma 100 zł. Kupuje 1,5 kg żelków w cenie 24,40 zł za kilogram oraz 4 butelki napoju izotonicznego po 4,75 zł za sztukę. Czy wystarczy mu reszty na zakup nowej, legendarnej skórki w grze, która kosztuje 45,99 zł? Jeśli nie, ile mu zabraknie?",
                options: [
                    "Zostanie 44,40 zł, zabraknie 1,59 zł.",
                    "Zostanie 45,60 zł, zabraknie 0,39 zł.",
                    "Zostanie 44,40 zł, wystarczy i zostanie 1,59 zł.",
                    "Zostanie 55,60 zł, wystarczy."
                ],
                correctAnswerIndex: 0,
                hint: "Najpierw policz koszt żelków (1,5 * 24,40) i napojów (4 * 4,75), a potem odejmij to wszystko od 100 zł."
            },
            {
                id: 1,
                question: "Zmutowany ślimak wyścigowy Mikołaja, o imieniu 'Błyskawica', pełznie z prędkością 0,35 metra na minutę. Musi pokonać trasę o długości 4,2 metra. W połowie drogi Błyskawica robi sobie przerwę na zjedzenie radioaktywnej sałaty, co zajmuje mu 2,5 minuty. Ile łącznie minut zajmie mu wyścig od startu do mety?",
                options: [
                    "12 minut.",
                    "14 minut.",
                    "14,5 minuty.",
                    "8,5 minuty."
                ],
                correctAnswerIndex: 2,
                hint: "Podziel całą odległość przez prędkość ślimaka, aby uzyskać czas pełznięcia, a na koniec dodaj czas przerwy na sałatę."
            },
            {
                id: 2,
                question: "Mikołaj projektuje w swoim pokoju tajną bazę antyszpiegowską. Baza ma mieć podłogę w kształcie prostokąta o wymiarach 2,4 m na 3,5 m. Chce obkleić całą podłogę specjalną folią blokującą sygnał WiFi. Folia kosztuje 12,50 zł za metr kwadratowy. Ile Mikołaj zapłaci za folię?",
                options: [
                    "95 zł",
                    "105 zł",
                    "110,50 zł",
                    "84 zł"
                ],
                correctAnswerIndex: 1,
                hint: "Oblicz pole powierzchni podłogi (mnożąc długość przez szerokość), a następnie pomnóż ten wynik przez cenę za jeden metr kwadratowy."
            },
            {
                id: 3,
                question: "Do zasilenia eksperymentalnego reaktora (super-latarki) potrzeba dokładnie 0,085 kg czystego krystalium. Mikołaj znalazł w tajnej skrytce trzy kawałki tego minerału o wagach: 25,5 g, 0,03 kg oraz 14,2 g. Ile gramów krystalium mu jeszcze brakuje do uruchomienia reaktora?",
                options: [
                    "16,3 g",
                    "0,153 g",
                    "45,3 g",
                    "15,3 g"
                ],
                correctAnswerIndex: 3,
                hint: "Zamień wszystkie wartości na gramy (pamiętaj, że 1 kg to 1000 g!). Dodaj to, co już masz, a potem odejmij od tego, czego potrzebujesz."
            },
            {
                id: 4,
                question: "Mikołaj uwarzył w wannie 3,15 litra eliksiru niewidzialności. Musi go teraz przelać do małych, taktycznych fiolek, które zabierze na misję. Każda fiolka mieści dokładnie 0,45 litra eliksiru. Ile pełnych fiolek uda mu się napełnić i ile eliksiru zostanie mu na dnie wanny?",
                options: [
                    "6 fiolek, zostanie 0,45 litra.",
                    "7 fiolek, zostanie 0 litrów.",
                    "7 fiolek, zostanie 0,15 litra.",
                    "8 fiolek, zostanie 0 litrów."
                ],
                correctAnswerIndex: 1,
                hint: "Wykonaj dzielenie 3,15 przez 0,45. Możesz przesunąć przecinek w obu liczbach o dwa miejsca w prawo, żeby było łatwiej dzilić (315 na 45)!"
            }
        ];

        // System Audio API
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                if (!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);

                const now = this.ctx.currentTime;
                
                if (type === 'correct') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.exponentialRampToValueAtTime(1046.5, now + 0.15);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'click') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(400, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } else if (type === 'win') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.setValueAtTime(554.37, now + 0.2);
                    osc.frequency.setValueAtTime(659.25, now + 0.4);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now + 0.8);
                    osc.start(now);
                    osc.stop(now + 0.8);
                }
            }
        };

        const App = () => {
            const [hasStarted, setHasStarted] = useState(false);
            const [queue, setQueue] = useState([0, 1, 2, 3, 4]); // Kolejka ID zadań
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [multipliers, setMultipliers] = useState({0: 1, 1: 1, 2: 1, 3: 1, 4: 1});
            
            const [showHint, setShowHint] = useState(false);
            const [feedback, setFeedback] = useState(null); // 'correct' lub 'wrong'
            const [isFinished, setIsFinished] = useState(false);
            const [isAnimating, setIsAnimating] = useState(false);

            const startGame = () => {
                AudioEngine.init();
                AudioEngine.play('click');
                setHasStarted(true);
            };

            const handleAnswer = (selectedIndex) => {
                if (isAnimating) return; // Zabezpieczenie przed szybkim klikaniem
                
                AudioEngine.init();
                setIsAnimating(true);
                setShowHint(false);
                
                const currentTask = taskDatabase[queue[currentIndex]];
                const isCorrect = selectedIndex === currentTask.correctAnswerIndex;

                if (isCorrect) {
                    AudioEngine.play('correct');
                    setFeedback('correct');
                    setScore(prev => prev + multipliers[currentTask.id]);
                    
                    setTimeout(() => {
                        proceedToNext(true, currentTask.id);
                    }, 1200);
                } else {
                    AudioEngine.play('wrong');
                    setFeedback('wrong');
                    
                    setTimeout(() => {
                        proceedToNext(false, currentTask.id);
                    }, 1500);
                }
            };

            const proceedToNext = (wasCorrect, taskId) => {
                setFeedback(null);
                setIsAnimating(false);
                
                if (!wasCorrect) {
                    // Przesuń na koniec kolejki i zmień mnożnik na 0.75
                    setQueue(prev => [...prev, taskId]);
                    setMultipliers(prev => ({...prev, [taskId]: 0.75}));
                }

                if (currentIndex + 1 >= (wasCorrect ? queue.length : queue.length + 1)) {
                    AudioEngine.play('win');
                    setIsFinished(true);
                } else {
                    setCurrentIndex(prev => prev + 1);
                }
            };

            const triggerHint = () => {
                AudioEngine.init();
                AudioEngine.play('click');
                setShowHint(true);
            };

            if (!hasStarted) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 to-gray-900">
                        <div className="glass-panel p-8 rounded-2xl max-w-2xl w-full text-center neon-shadow">
                            <h1 className="text-4xl md:text-6xl font-gamer neon-text text-neon-blue mb-6">Misja: Ułamki</h1>
                            <p className="text-lg text-gray-300 mb-8 font-sans">
                                Cześć Mikołaj! Przed Tobą 5 epickich wyzwań. 
                                Jeśli popełnisz błąd, zadanie wróci na koniec kolejki, ale dostaniesz za nie 75% punktów. 
                                Możesz korzystać z podpowiedzi. Pokaż na co Cię stać!
                            </p>
                            <button 
                                onClick={startGame}
                                className="font-gamer text-xl bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white py-4 px-12 rounded-full transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(6,182,212,0.6)]"
                            >
                                START SYSTEMU
                            </button>
                        </div>
                    </div>
                );
            }

            if (isFinished) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 to-gray-900">
                        <div className="glass-panel p-8 rounded-2xl max-w-2xl w-full text-center neon-shadow">
                            <h2 className="text-5xl font-gamer text-neon-purple mb-6 text-shadow-lg">MISJA ZAKOŃCZONA!</h2>
                            <div className="text-2xl mb-8">
                                Twój wynik to:<br/>
                                <span className="text-6xl font-gamer text-neon-blue neon-text mt-4 block">{score.toFixed(2)} / 5</span>
                            </div>
                            <p className="text-gray-300 mb-8">
                                {score === 5 ? "Perfekcja! Jesteś mistrzem ułamków dziesiętnych!" : 
                                 score >= 4 ? "Świetna robota! Bardzo niewiele zabrakło do ideału." : 
                                 "Dobra próba! Następnym razem na pewno pójdzie Ci jeszcze lepiej!"}
                            </p>
                            <button 
                                onClick={() => window.location.reload()}
                                className="font-gamer text-lg bg-gray-700 hover:bg-gray-600 py-3 px-8 rounded-full transition-all"
                            >
                                ZAGRAJ PONOWNIE
                            </button>
                        </div>
                    </div>
                );
            }

            const currentTask = taskDatabase[queue[currentIndex]];
            const currentMultiplier = multipliers[currentTask.id];

            return (
                <div className="min-h-screen p-4 md:p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 to-gray-900 flex flex-col">
                    {/* Header z progresem i wynikiem */}
                    <div className="flex justify-between items-center mb-8 glass-panel p-4 rounded-xl">
                        <div className="font-gamer text-neon-blue">
                            Zadanie {currentIndex + 1} / {queue.length}
                        </div>
                        <div className="font-gamer text-neon-purple">
                            Punkty: {score.toFixed(2)}
                        </div>
                    </div>

                    {/* Główny kontener pytania */}
                    <div className={`flex-1 flex flex-col items-center justify-center max-w-4xl mx-auto w-full transition-all ${feedback === 'wrong' ? 'animate-shake' : ''}`}>
                        <div className={`glass-panel p-6 md:p-10 rounded-2xl w-full relative overflow-hidden transition-all duration-300 ${feedback === 'correct' ? 'border-green-500 shadow-[0_0_30px_rgba(34,197,94,0.3)]' : feedback === 'wrong' ? 'border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.3)]' : 'border-gray-600'}`}>
                            
                            {/* Wskaźnik mnożnika (pokazuje się, gdy zadanie jest poprawiane) */}
                            {currentMultiplier < 1 && (
                                <div className="absolute top-0 right-0 bg-orange-500 text-white text-xs font-bold px-3 py-1 rounded-bl-lg">
                                    RETRY (Max 0.75 pkt)
                                </div>
                            )}

                            <h3 className="text-xl md:text-2xl leading-relaxed mb-8 font-sans font-semibold">
                                {currentTask.question}
                            </h3>

                            {/* Opcje odpowiedzi */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                {currentTask.options.map((option, idx) => {
                                    let btnClass = "bg-gray-800 border-2 border-gray-600 hover:border-neon-blue text-left p-4 rounded-xl transition-all duration-200 transform hover:-translate-y-1";
                                    
                                    if (feedback !== null) {
                                        if (idx === currentTask.correctAnswerIndex) {
                                            btnClass = "bg-green-900/50 border-2 border-green-500 text-left p-4 rounded-xl scale-105";
                                        } else if (feedback === 'wrong') {
                                            btnClass = "bg-red-900/50 border-2 border-red-500 text-left p-4 rounded-xl opacity-50";
                                        } else {
                                            btnClass = "bg-gray-800 border-2 border-gray-600 text-left p-4 rounded-xl opacity-50";
                                        }
                                    }

                                    return (
                                        <button 
                                            key={idx}
                                            disabled={isAnimating}
                                            onClick={() => handleAnswer(idx)}
                                            className={btnClass}
                                        >
                                            <span className="font-gamer text-neon-blue mr-3">{['A', 'B', 'C', 'D'][idx]}.</span>
                                            {option}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Panel Podpowiedzi */}
                            <div className="border-t border-gray-700 pt-6 flex flex-col items-center">
                                {!showHint ? (
                                    <button 
                                        onClick={triggerHint}
                                        disabled={isAnimating}
                                        className="text-gray-400 hover:text-yellow-400 flex items-center transition-colors text-sm uppercase tracking-wider font-bold"
                                    >
                                        <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                        </svg>
                                        Potrzebuję wsparcia (Podpowiedź)
                                    </button>
                                ) : (
                                    <div className="bg-yellow-900/30 border border-yellow-600/50 p-4 rounded-lg text-yellow-200 text-sm animate-fade-in w-full text-center">
                                        <strong className="block mb-1 text-yellow-500 font-gamer text-xs">LOGI SYSTEMU:</strong>
                                        {currentTask.hint}
                                    </div>
                                )}
                            </div>

                            {/* Nakładka Feedbacku */}
                            {feedback === 'correct' && (
                                <div className="absolute inset-0 flex items-center justify-center bg-green-900/20 backdrop-blur-sm z-10 rounded-2xl pointer-events-none">
                                    <div className="font-gamer text-5xl text-green-400 drop-shadow-[0_0_15px_rgba(34,197,94,1)]">
                                        DOBRY STRZAŁ!
                                    </div>
                                </div>
                            )}
                            {feedback === 'wrong' && (
                                <div className="absolute inset-0 flex items-center justify-center bg-red-900/20 backdrop-blur-sm z-10 rounded-2xl pointer-events-none">
                                    <div className="font-gamer text-5xl text-red-400 drop-shadow-[0_0_15px_rgba(239,68,68,1)]">
                                        BŁĄD SYSTEMU!
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
