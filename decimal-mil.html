<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milionerzy: Ułamki Dziesiętne (Nowe Pytania)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React i ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1e3a8a 0%, #0f172a 100%);
            color: white;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        .millionaire-btn {
            background: linear-gradient(180deg, #1e3a8a 0%, #000000 100%);
            border: 2px solid #60a5fa;
            position: relative;
            clip-path: polygon(5% 0, 95% 0, 100% 50%, 95% 100%, 5% 100%, 0 50%);
        }
        .millionaire-btn:hover:not(:disabled) {
            background: linear-gradient(180deg, #2563eb 0%, #1e40af 100%);
            border-color: #93c5fd;
        }
        .millionaire-btn.selected {
            background: linear-gradient(180deg, #d97706 0%, #92400e 100%);
            border-color: #fcd34d;
        }
        .millionaire-btn.correct {
            background: linear-gradient(180deg, #16a34a 0%, #14532d 100%);
            border-color: #86efac;
            animation: pulse-green 1s infinite;
            z-index: 10;
        }
        .millionaire-btn.incorrect {
            background: linear-gradient(180deg, #dc2626 0%, #7f1d1d 100%);
            border-color: #fca5a5;
            animation: pulse-red 1s infinite;
        }
        .millionaire-btn.hidden-answer {
            visibility: hidden;
        }
        .question-box {
            background: linear-gradient(180deg, #1e3a8a 0%, #000000 100%);
            border: 2px solid #60a5fa;
            clip-path: polygon(2% 0, 98% 0, 100% 50%, 98% 100%, 2% 100%, 0 50%);
        }
        .money-tree-item.active {
            background-color: #d97706;
            color: white;
            border-radius: 9999px;
            font-weight: bold;
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 15px #22c55e; }
            50% { box-shadow: 0 0 30px #4ade80; }
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 15px #dc2626; }
            50% { box-shadow: 0 0 30px #f87171; }
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- ZUPEŁNIE NOWA BAZA PYTAŃ Z UŁAMKÓW DZIESIĘTNYCH ---
    const questionBank = [
        { text: "Jak zapisać ułamek 'trzy dziesiąte'?", options: ["0,3", "0,03", "3,10", "0,003"], correct: "0,3" },
        { text: "Który z podanych ułamków jest największy?", options: ["0,5", "0,15", "0,095", "0,49"], correct: "0,5" },
        { text: "Zapisz 5 zł i 8 gr za pomocą przecinka.", options: ["5,08 zł", "5,80 zł", "5,8 zł", "0,58 zł"], correct: "5,08 zł" },
        { text: "Oblicz w pamięci: 1,5 + 2,3.", options: ["3,8", "4,8", "3,08", "0,38"], correct: "3,8" },
        { text: "Zamień 250 cm na metry.", options: ["2,5 m", "0,25 m", "25,0 m", "250,0 m"], correct: "2,5 m" },
        { text: "O ile liczba 5,4 jest większa od 3,1?", options: ["2,3", "1,3", "8,5", "2,03"], correct: "2,3" },
        { text: "Wynik odejmowania 1 - 0,4 to:", options: ["0,6", "0,96", "1,4", "0,06"], correct: "0,6" },
        { text: "Przesuń przecinek: 0,045 * 100 =", options: ["4,5", "45", "0,45", "450"], correct: "4,5" },
        { text: "Bartek kupił 3 lody po 2,50 zł każdy. Ile zapłacił?", options: ["7,50 zł", "6,50 zł", "5,50 zł", "8,50 zł"], correct: "7,50 zł" },
        { text: "Co otrzymamy po pominięciu niepotrzebnych zer w ułamku 0,500?", options: ["0,5", "0,05", "5,0", "5,00"], correct: "0,5" },
        { text: "Wynik działania 12,4 : 10 wynosi:", options: ["1,24", "124", "0,124", "1,024"], correct: "1,24" },
        { text: "Wstążka ma 2 m długości. Odcięto z niej 0,85 m. Zostało:", options: ["1,15 m", "1,25 m", "0,15 m", "1,85 m"], correct: "1,15 m" },
        { text: "Jak zapiszesz ułamek zwykły 7/100 w postaci dziesiętnej?", options: ["0,07", "0,7", "0,007", "7,00"], correct: "0,07" },
        { text: "Odejmij w pamięci: 5,3 - 2,15.", options: ["3,15", "3,25", "2,85", "3,85"], correct: "3,15" },
        { text: "Kilogram pomidorów kosztuje 8,20 zł. Ile kosztuje 0,5 kg?", options: ["4,10 zł", "4,00 zł", "4,20 zł", "16,40 zł"], correct: "4,10 zł" },
        { text: "Która z liczb leży na osi dokładnie w połowie między 0,1 a 0,2?", options: ["0,15", "0,015", "0,25", "0,09"], correct: "0,15" },
        { text: "Ułamek dziesiętny 0,75 to inaczej ułamek zwykły:", options: ["3/4", "1/4", "1/2", "1/3"], correct: "3/4" },
        { text: "Jaki jest obwód kwadratu o boku 1,2 m?", options: ["4,8 m", "2,4 m", "3,6 m", "1,44 m"], correct: "4,8 m" },
        { text: "Które dodawanie daje wynik równo 1?", options: ["0,3 + 0,7", "0,5 + 0,05", "0,9 + 0,9", "0,2 + 0,08"], correct: "0,3 + 0,7" },
        { text: "Mama kupiła 1,5 kg jabłek i o 0,3 kg więcej gruszek. Ile ważyły gruszki?", options: ["1,8 kg", "1,2 kg", "3,3 kg", "0,45 kg"], correct: "1,8 kg" }
    ];

    const prizeMoney = [
        "500 zł", "1 000 zł", "2 000 zł", "5 000 zł", "10 000 zł",
        "20 000 zł", "40 000 zł", "75 000 zł", "150 000 zł",
        "250 000 zł", "500 000 zł", "1 000 000 zł"
    ];

    // --- AUDIO SYSTEM ---
    let audioCtx = null;

    const initAudio = () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    };

    const playTone = (frequency, type, duration, vol = 0.1) => {
        if (!audioCtx) return;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    };

    const soundSuspense = () => playTone(110, 'sine', 2.0, 0.2);
    const soundLock = () => playTone(300, 'square', 0.1, 0.05);
    const soundWin = () => {
        playTone(440, 'triangle', 0.2);
        setTimeout(() => playTone(554.37, 'triangle', 0.2), 150);
        setTimeout(() => playTone(659.25, 'triangle', 0.4), 300);
    };
    const soundLose = () => {
        playTone(300, 'sawtooth', 0.4, 0.2);
        setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.2), 300);
        setTimeout(() => playTone(200, 'sawtooth', 0.8, 0.2), 600);
    };

    const App = () => {
        const [gameState, setGameState] = useState('start');
        const [playerName, setPlayerName] = useState("");
        const [questions, setQuestions] = useState([]);
        const [currentLevel, setCurrentLevel] = useState(0);
        const [selectedAnswer, setSelectedAnswer] = useState(null);
        const [isLocked, setIsLocked] = useState(false);
        const [revealState, setRevealState] = useState(null); // 'correct' lub 'incorrect'
        const [hiddenOptions, setHiddenOptions] = useState([]);

        const [lifelines, setLifelines] = useState({ fifty: true, phone: true, audience: true, host: true });
        const [activeModal, setActiveModal] = useState(null);

        const startGame = (e) => {
            e.preventDefault();
            initAudio();
            const shuffled = [...questionBank].sort(() => 0.5 - Math.random()).slice(0, 12);

            // Tasowanie opcji wewnątrz pytań
            const questionsWithShuffledOptions = shuffled.map(q => {
                return {
                    ...q,
                    options: [...q.options].sort(() => 0.5 - Math.random())
                }
            });

            setQuestions(questionsWithShuffledOptions);
            setCurrentLevel(0);
            setGameState('playing');
            setLifelines({ fifty: true, phone: true, audience: true, host: true });
            setHiddenOptions([]);
            setActiveModal(null);
            setRevealState(null);
            setSelectedAnswer(null);
            setIsLocked(false);
        };

        const handleAnswerClick = (option) => {
            if (isLocked) return;
            initAudio();
            setSelectedAnswer(option);
        };

        const confirmAnswer = () => {
            if (!selectedAnswer) return;
            setIsLocked(true);
            soundLock();
            soundSuspense();

            setTimeout(() => {
                const isCorrect = selectedAnswer === questions[currentLevel].correct;
                setRevealState(isCorrect ? 'correct' : 'incorrect');

                if (isCorrect) {
                    soundWin();
                    setTimeout(() => {
                        if (currentLevel === 11) {
                            setGameState('won');
                        } else {
                            setCurrentLevel(prev => prev + 1);
                            setSelectedAnswer(null);
                            setIsLocked(false);
                            setRevealState(null);
                            setHiddenOptions([]);
                        }
                    }, 2500); // Pokazuj poprawną odpowiedź przez 2.5s
                } else {
                    soundLose();
                    setTimeout(() => {
                        setGameState('lost');
                    }, 3000); // Pokazuj błędną odpowiedź przez 3s
                }
            }, 2000); // 2 sekundy budowania napięcia na pomarańczowo
        };

        const useFiftyFifty = () => {
            if (!lifelines.fifty || isLocked) return;
            initAudio();
            const correct = questions[currentLevel].correct;
            const incorrect = questions[currentLevel].options.filter(o => o !== correct);
            const toHide = incorrect.sort(() => 0.5 - Math.random()).slice(0, 2);
            setHiddenOptions(toHide);
            setLifelines(prev => ({ ...prev, fifty: false }));
        };

        const usePhone = () => {
            if (!lifelines.phone || isLocked) return;
            initAudio();
            setActiveModal('phone');
            setLifelines(prev => ({ ...prev, phone: false }));
        };

        const useAudience = () => {
            if (!lifelines.audience || isLocked) return;
            initAudio();
            setActiveModal('audience');
            setLifelines(prev => ({ ...prev, audience: false }));
        };

        const useHost = () => {
            if (!lifelines.host || isLocked) return;
            initAudio();
            setActiveModal('host');
            setLifelines(prev => ({ ...prev, host: false }));
        };

        if (gameState === 'start') {
            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                    <div className="w-32 h-32 rounded-full border-4 border-blue-400 flex items-center justify-center bg-blue-900 shadow-[0_0_50px_rgba(59,130,246,0.5)] mb-8">
                        <span className="text-4xl">💰</span>
                    </div>
                    <h1 className="text-4xl md:text-6xl font-bold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-200">
                        Milionerzy
                    </h1>
                    <p className="text-xl text-blue-200 mb-8">Edycja: Ułamki Dziesiętne (Nowe pytania)</p>

                    <form onSubmit={startGame} className="w-full max-w-md">
                        <input
                            type="text"
                            placeholder="Podaj imię, Graczu!"
                            value={playerName}
                            onChange={(e) => setPlayerName(e.target.value)}
                            className="w-full p-4 rounded-full bg-slate-800 border-2 border-blue-500 text-white text-center text-xl focus:outline-none focus:border-yellow-400 mb-6"
                            required
                        />
                        <button type="submit" className="px-10 py-4 bg-gradient-to-r from-blue-600 to-blue-800 rounded-full text-xl font-bold border-2 border-blue-400 hover:scale-105 transition-transform shadow-[0_0_20px_rgba(37,99,235,0.5)] uppercase tracking-wider">
                            Zagraj o Milion
                        </button>
                    </form>
                </div>
            );
        }

        if (gameState === 'won' || gameState === 'lost') {
            let wonAmount = "0 zł";
            if (gameState === 'won') {
                wonAmount = "1 000 000 zł";
            } else {
                if (currentLevel >= 6) wonAmount = "40 000 zł";
                else if (currentLevel >= 1) wonAmount = "1 000 zł";
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center bg-slate-900">
                    <h1 className={`text-5xl font-bold mb-4 ${gameState === 'won' ? 'text-yellow-400' : 'text-red-500'}`}>
                        {gameState === 'won' ? 'MAMY MILIONERA!' : 'Niestety, zła odpowiedź!'}
                    </h1>
                    <p className="text-2xl text-blue-200 mb-2">{playerName}, wygrywasz:</p>
                    <div className="text-6xl font-black text-white mb-10 shadow-yellow-500/50 drop-shadow-[0_0_15px_rgba(234,179,8,0.8)]">
                        {wonAmount}
                    </div>
                    <button onClick={() => setGameState('start')} className="px-8 py-4 bg-blue-700 rounded-full font-bold hover:bg-blue-600 transition-colors border-2 border-blue-400">
                        Zagraj jeszcze raz
                    </button>
                </div>
            );
        }

        const q = questions[currentLevel];

        const renderModal = () => {
            if (!activeModal) return null;
            let title = "";
            let content = null;

            if (activeModal === 'phone') {
                title = "Telefon do przyjaciela";
                content = <p className="text-lg italic">"Hej {playerName || 'stary'}! Ostatnio trochę powtarzałem ułamki. Intuicja mi podpowiada, że to może być: <strong className="text-yellow-400">{q.correct}</strong>. Mam nadzieję, że pomogłem!"</p>;
            } else if (activeModal === 'audience') {
                title = "Głosowanie publiczności";
                const correctIdx = q.options.indexOf(q.correct);
                let bars = [12, 18, 5, 65].sort(() => 0.5 - Math.random());
                const maxVal = Math.max(...bars);
                const maxIdx = bars.indexOf(maxVal);
                [bars[correctIdx], bars[maxIdx]] = [bars[maxIdx], bars[correctIdx]];

                content = (
                    <div className="flex justify-around items-end h-40 mt-4 border-b border-blue-500 pb-2">
                        {q.options.map((opt, i) => (
                            <div key={i} className="flex flex-col items-center w-1/4">
                                <span className="mb-2 text-sm">{bars[i]}%</span>
                                <div className="w-8 bg-blue-500 rounded-t" style={{ height: `${bars[i]}%` }}></div>
                                <span className="mt-2 font-bold text-yellow-400">{String.fromCharCode(65 + i)}</span>
                            </div>
                        ))}
                    </div>
                );
            } else if (activeModal === 'host') {
                title = "Podpowiedź prowadzącego";
                const fakeHints = [
                    "Matematyka to królowa nauk, ale bywa podstępna. Uważaj na przecinki!",
                    `Gdybym strzelał, obstawiłbym ${q.options[Math.floor(Math.random()*4)]}... Ale pamiętaj, to Twoja gra.`,
                    `Coś mi podpowiada, że odpowiedź to ${q.correct}. Jesteś na dobrej drodze!`,
                    "Wyklucz te odpowiedzi, w których rzędy wielkości totalnie się nie zgadzają."
                ];
                content = <p className="text-lg text-slate-300 italic">Hubert U.: "{fakeHints[Math.floor(Math.random() * fakeHints.length)]}"</p>;
            }

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4">
                    <div className="bg-slate-800 border-2 border-blue-400 rounded-2xl p-6 max-w-md w-full shadow-2xl relative">
                        <h2 className="text-2xl font-bold text-yellow-400 mb-4">{title}</h2>
                        {content}
                        <button
                            onClick={() => setActiveModal(null)}
                            className="mt-6 w-full py-3 bg-blue-600 rounded-lg font-bold hover:bg-blue-500 transition-colors"
                        >
                            Zamknij i wracaj do gry
                        </button>
                    </div>
                </div>
            );
        };

        return (
            <div className="min-h-screen flex flex-col md:flex-row max-w-6xl mx-auto">
                <div className="flex-1 flex flex-col p-4 md:p-8 relative">
                    <div className="flex justify-center gap-4 mb-auto">
                        <button onClick={useFiftyFifty} disabled={!lifelines.fifty || isLocked} className={`w-16 h-12 rounded-full border-2 font-bold flex items-center justify-center ${lifelines.fifty ? 'border-yellow-400 text-yellow-400 bg-slate-800 hover:bg-slate-700' : 'border-slate-600 text-slate-600'}`}>
                            50:50
                        </button>
                        <button onClick={usePhone} disabled={!lifelines.phone || isLocked} className={`w-16 h-12 rounded-full border-2 font-bold flex items-center justify-center ${lifelines.phone ? 'border-yellow-400 text-yellow-400 bg-slate-800 hover:bg-slate-700' : 'border-slate-600 text-slate-600'}`}>
                            📞
                        </button>
                        <button onClick={useAudience} disabled={!lifelines.audience || isLocked} className={`w-16 h-12 rounded-full border-2 font-bold flex items-center justify-center ${lifelines.audience ? 'border-yellow-400 text-yellow-400 bg-slate-800 hover:bg-slate-700' : 'border-slate-600 text-slate-600'}`}>
                            👥
                        </button>
                        <button onClick={useHost} disabled={!lifelines.host || isLocked} className={`w-16 h-12 rounded-full border-2 font-bold flex items-center justify-center ${lifelines.host ? 'border-yellow-400 text-yellow-400 bg-slate-800 hover:bg-slate-700' : 'border-slate-600 text-slate-600'}`} title="Pomoc Prowadzącego">
                            🎤
                        </button>
                    </div>

                    <div className="mt-8 mb-12">
                        <div className="question-box p-6 md:p-10 text-center text-xl md:text-2xl font-bold shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                            {currentLevel + 1}. {q.text}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {q.options.map((opt, idx) => {
                            const isHidden = hiddenOptions.includes(opt);
                            let btnClass = "";

                            if (isLocked) {
                                if (selectedAnswer === opt) {
                                    // Początkowo pomarańczowy w trakcie napięcia, po chwili zieleń/czerwień
                                    btnClass = "selected";
                                    if (revealState === 'correct') btnClass = "correct";
                                    else if (revealState === 'incorrect') btnClass = "incorrect";
                                }
                                // Zawsze pokaż poprawną odpowiedź na zielono, gdy ujawniamy wynik
                                if (revealState !== null && opt === q.correct) {
                                    btnClass = "correct";
                                }
                            } else {
                                if (selectedAnswer === opt) btnClass = "selected";
                            }

                            return (
                                <button
                                    key={idx}
                                    onClick={() => handleAnswerClick(opt)}
                                    disabled={isLocked || isHidden}
                                    className={`millionaire-btn p-4 md:p-6 text-left flex items-center gap-4 transition-all ${btnClass} ${isHidden ? 'hidden-answer' : ''}`}
                                >
                                        <span className="text-yellow-400 font-black text-xl w-6">
                                            {String.fromCharCode(65 + idx)}:
                                        </span>
                                    <span className="text-lg md:text-xl">{opt}</span>
                                </button>
                            );
                        })}
                    </div>

                    <div className="mt-8 text-center h-16">
                        {selectedAnswer && !isLocked && (
                            <button
                                onClick={confirmAnswer}
                                className="px-8 py-3 bg-yellow-500 text-black font-bold rounded-full animate-pulse hover:bg-yellow-400 shadow-[0_0_15px_rgba(234,179,8,0.5)]"
                            >
                                OSTATECZNA ODPOWIEDŹ
                            </button>
                        )}
                    </div>
                </div>

                <div className="md:w-64 p-4 flex flex-col justify-center border-t md:border-t-0 md:border-l border-blue-800 bg-slate-900 md:bg-transparent">
                    <div className="flex flex-col-reverse gap-2">
                        {prizeMoney.map((prize, idx) => {
                            const isCurrent = idx === currentLevel;
                            const isGuaranteed = idx === 1 || idx === 6 || idx === 11;
                            const isPassed = idx < currentLevel;

                            let textClass = "text-blue-300";
                            if (isCurrent) textClass = "text-white font-bold";
                            else if (isGuaranteed) textClass = "text-yellow-500 font-bold";
                            else if (isPassed) textClass = "text-blue-600";

                            return (
                                <div key={idx} className={`flex justify-between px-4 py-1 text-lg md:text-base ${isCurrent ? 'bg-orange-600 rounded-full' : ''} ${textClass}`}>
                                    <span>{idx + 1}</span>
                                    <span>{prize}</span>
                                </div>
                            )
                        })}
                    </div>
                </div>

                {renderModal()}
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
